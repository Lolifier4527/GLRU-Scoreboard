<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GLRU Scoreboard — Unavailable</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a0000 0%, #0a0000 60%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', 'Segoe UI', Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(180,0,0,0.03) 2px,
          rgba(180,0,0,0.03) 4px
        );
      pointer-events: none;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 36px;
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #cc0000, #ff4444, #cc0000, transparent);
      box-shadow: 0 0 12px #ff0000;
    }

    img {
      width: 110px;
      filter:
        drop-shadow(0 0 18px rgba(255,0,0,0.7))
        drop-shadow(0 0 40px rgba(200,0,0,0.4));
    }

    h1 {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 4px;
      margin-bottom: 14px;
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #ffcccc 20%,
        #ff4444 40%,
        #cc0000 55%,
        #880000 70%,
        #cc0000 80%,
        #ff6666 90%,
        #ffaaaa 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 6px rgba(255,0,0,0.5));
      text-shadow: none;
    }

    .divider {
      width: 200px;
      height: 1px;
      margin: 0 auto 16px;
      background: linear-gradient(90deg, transparent, #660000, #ff2222, #660000, transparent);
      box-shadow: 0 0 8px rgba(255,0,0,0.4);
    }

    p {
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #c0a0a0;
      max-width: 340px;
      line-height: 1.7;
      background: linear-gradient(180deg, #ddbbbb, #aa7777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      margin-top: 32px;
      padding: 6px 18px;
      border: 1px solid #550000;
      border-radius: 2px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #880000;
      background: linear-gradient(135deg, rgba(80,0,0,0.3), rgba(20,0,0,0.5));
      box-shadow:
        0 0 0 1px rgba(200,0,0,0.1),
        inset 0 1px 0 rgba(255,100,100,0.1);
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="GLRU_Logo.png" alt="GLRU Logo" />
  </div>
  <h1>Temporarily Unavailable</h1>
  <div class="divider"></div>
  <p>The GLRU Scoreboard is not available right now. Please check back later.</p>
  <div class="badge">Service Suspended</div>
</body>
</html>
