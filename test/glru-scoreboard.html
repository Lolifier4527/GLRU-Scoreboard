<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLRU Live Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:   #F5A623;
  --green:  #E53935;
  --bg:     #0a0000;
  --panel:  #1a0505;
  --border: rgba(245,166,35,0.2);
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'DM Sans', sans-serif;
}

html, body {
  background: var(--bg);
  color: #fff;
  font-family: var(--font-b);
  height: 100vh;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  background: rgba(26,5,5,0.97);
  border-bottom: 2px solid var(--gold);
  padding: 10px 28px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px;
  position: relative; z-index: 10;
}
.topbar-logo { height: 34px; object-fit: contain; }
.topbar-center { text-align: center; }
.topbar-title { font-family: var(--font-d); font-size: 26px; color: var(--gold); letter-spacing: 3px; line-height: 1; }
.topbar-sub { font-size: 11px; color: rgba(245,166,35,0.65); letter-spacing: 2px; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--green);
  letter-spacing: 1px;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

/* ── Fields viewport ── */
#fields-area {
  display: flex;
  height: calc(100vh - 58px);
  width: 100%;
}

/* ── Field panel ── */
.field-panel {
  display: none;
  flex: 1;
  flex-direction: column;
  position: relative;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.field-panel:last-child { border-right: none; }
.field-panel.active { display: flex; }

/* ── Background glow ── */
.field-panel::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(183,28,28,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,166,35,0.04) 0%, transparent 60%);
  pointer-events: none;
}

/* ── Field header ── */
.field-header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 14px 20px 8px;
  border-bottom: 1px solid var(--border);
}
.field-label {
  font-family: var(--font-d);
  letter-spacing: 4px;
  color: rgba(245,166,35,0.5);
}
.age-group-label {
  font-family: var(--font-d);
  letter-spacing: 2px;
  color: rgba(255,255,255,0.75);
  margin-top: 2px;
}

/* ── Score area ── */
.score-area {
  flex: 1; position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 12px;
}
.teams-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; gap: 8px; margin-bottom: 6px;
}
.team-block { flex: 1; text-align: center; }
.team-name {
  font-family: var(--font-d);
  letter-spacing: 2px; line-height: 1.1;
  color: rgba(255,255,255,0.85);
  word-break: break-word;
}
.score-row {
  display: flex; align-items: center; justify-content: center;
  width: 100%;
}
.score-num {
  font-family: var(--font-d);
  line-height: 1; text-align: center;
  transition: color 0.4s; flex: 1;
}
.score-num.leader { color: var(--gold); }
.score-num.tied   { color: rgba(255,255,255,0.6); }
.score-vs-label {
  font-family: var(--font-d);
  color: rgba(245,166,35,0.4);
  flex: 0 0 auto; text-align: center;
}

/* ── Stats ── */
.stats-row {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; padding: 4px 12px 10px;
  position: relative; z-index: 2;
}
.stat-pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(245,166,35,0.12);
  border-radius: 8px; padding: 6px 14px;
  font-size: clamp(11px, 1.8vw, 15px); color: rgba(255,255,255,0.5);
  white-space: nowrap;
}
.stat-pill .sv { color: rgba(245,166,35,0.8); font-weight: 700; }

/* ── Timer ── */
.break-row {
  position: relative; z-index: 2;
  text-align: center; padding: 0 12px 12px;
}
.timer-readout {
  font-family: var(--font-d);
  color: rgba(245,166,35,0.55);
  letter-spacing: 3px;
}

/* ── Half time overlay ── */
.halftime-overlay {
  position: absolute; inset: 0; z-index: 50;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s;
}
.halftime-overlay.active { opacity: 1; pointer-events: all; }
.halftime-text {
  font-family: var(--font-d);
  font-size: clamp(48px, 12vw, 120px);
  color: rgba(245,166,35,0.9);
  letter-spacing: 8px;
  animation: htPulse 2s infinite;
}
.halftime-sub {
  font-family: var(--font-d);
  font-size: clamp(16px, 3vw, 32px);
  color: rgba(245,166,35,0.4);
  letter-spacing: 6px;
  margin-top: 8px;
}
@keyframes htPulse { 0%,100%{opacity:0.9} 50%{opacity:0.5} }

/* ── Font sizes: single panel ── */
#fields-area.solo .field-label     { font-size: clamp(14px, 1.6vw, 22px); }
#fields-area.solo .age-group-label { font-size: clamp(24px, 4vw,  52px); }
#fields-area.solo .team-name       { font-size: clamp(28px, 5vw,  72px); }
#fields-area.solo .score-num       { font-size: clamp(110px,18vw,260px); }
#fields-area.solo .score-vs-label  { font-size: clamp(32px, 5vw,  72px); }
#fields-area.solo .timer-readout   { font-size: clamp(22px, 3vw,  44px); }

/* ── Font sizes: dual panel ── */
#fields-area.dual .field-label     { font-size: clamp(12px, 1.2vw, 18px); }
#fields-area.dual .age-group-label { font-size: clamp(14px, 2vw,   30px); }
#fields-area.dual .team-name       { font-size: clamp(14px, 2.2vw, 36px); }
#fields-area.dual .score-num       { font-size: clamp(60px, 9vw,  130px); }
#fields-area.dual .score-vs-label  { font-size: clamp(18px, 2.5vw, 38px); }
#fields-area.dual .timer-readout   { font-size: clamp(14px, 1.8vw, 28px); }
#fields-area.dual .stat-pill       { font-size: 11px; padding: 3px 8px; }

/* dual border separator */
#fields-area.dual .field-panel.active + .field-panel.active {
  border-left: 2px solid var(--gold);
}

/* ── Waiting screen ── */
#waiting {
  position: fixed; inset: 0; z-index: 5;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
#waiting .wt { font-family: var(--font-d); font-size: 48px; color: var(--gold); letter-spacing: 4px; }
#waiting .ws { font-size: 14px; color: rgba(245,166,35,0.4); letter-spacing: 2px; }
.spinner {
  width: 44px; height: 44px; border-radius: 50%;
  border: 4px solid rgba(245,166,35,0.2);
  border-top-color: var(--gold);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <img src="GLRU_Logo.png" alt="GLRU" class="topbar-logo" onerror="this.style.display='none'">
  <div class="topbar-center">
    <div class="topbar-title">GLRU RUGBY</div>
    <div class="topbar-sub" id="topbar-sub">LIVE SCOREBOARD</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button onclick="toggleFullscreen()" id="fs-btn" title="Fullscreen" style="background:none;border:1px solid rgba(245,166,35,0.3);border-radius:8px;color:rgba(245,166,35,0.7);padding:5px 8px;cursor:pointer;font-size:16px;line-height:1;">⛶</button>
  </div>
</div>

<!-- FIELD PANELS (built by JS) -->
<div id="fields-area"></div>

<!-- WAITING -->
<div id="waiting">
  <div class="spinner"></div>
  <div class="wt">GLRU RUGBY</div>
  <div class="ws">WAITING FOR LIVE SCORE DATA...</div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const ABLY_API_KEY = '0TZ7SA.6wlyfQ:CSQeEsQNHUAtneNwaktRsK3R0uzmod0D0fvVK2-5qUM';
const ABLY_CHANNEL = 'glru-scoreboard';
const ALL_FIELDS   = ['A','B','C','D','E','F','G'];
const MAX_PANELS   = 2;

// ── URL param parsing ─────────────────────────────────────────
// ?field=A        → locked to single field A ("MAIN FIELD" label)
// ?field=A,B      → locked to exactly field A and B
// (none)          → auto mode: first 2 active fields
const _raw = new URLSearchParams(window.location.search).get('field');
let lockedFields = null;
if (_raw) {
  lockedFields = _raw.toUpperCase().split(',')
    .map(s => s.trim())
    .filter(s => ALL_FIELDS.includes(s))
    .slice(0, MAX_PANELS);
  if (lockedFields.length === 0) lockedFields = null;
}

// ── Slot state ────────────────────────────────────────────────
// Up to 2 display slots. slotToField[i] = fieldId or null
const slotToField = [null, null];
const fieldData   = {};   // fieldData[fieldId] = latest data

// ═══════════════════════════════════════════════════════════════
//  BUILD DOM
// ═══════════════════════════════════════════════════════════════
function createSlotEl(idx) {
  const sid = 'slot-' + idx;
  const div = document.createElement('div');
  div.className = 'field-panel';
  div.id = sid;
  div.innerHTML = `
    <div class="field-header">
      <div class="field-label" id="${sid}-label">–</div>
      <div class="age-group-label" id="${sid}-age"></div>
    </div>
    <div class="score-area">
      <div class="teams-row">
        <div class="team-block"><div class="team-name" id="${sid}-home">HOME</div></div>
        <div style="flex:0 0 24px"></div>
        <div class="team-block"><div class="team-name" id="${sid}-away">AWAY</div></div>
      </div>
      <div class="score-row">
        <div class="score-num tied" id="${sid}-sf">0</div>
        <div class="score-vs-label" id="${sid}-vs">–</div>
        <div class="score-num tied" id="${sid}-sa">0</div>
      </div>
    </div>
    <div class="break-row">
      <div class="timer-readout" id="${sid}-timer"></div>
    </div>
    <div class="stats-row" id="${sid}-stats"></div>
    <div class="halftime-overlay" id="${sid}-ht">
      <div class="halftime-text">HALF TIME</div>
      <div class="halftime-sub" id="${sid}-ht-sub">–</div>
    </div>
  `;
  return div;
}

const area = document.getElementById('fields-area');
area.appendChild(createSlotEl(0));
area.appendChild(createSlotEl(1));

// Pre-activate locked slots
if (lockedFields) {
  lockedFields.forEach((fid, i) => {
    slotToField[i] = fid;
    document.getElementById('slot-' + i).classList.add('active');
  });
  applyAreaClass();
  updateTopbar();
}

// ═══════════════════════════════════════════════════════════════
//  SLOT HELPERS
// ═══════════════════════════════════════════════════════════════
function fieldToSlot(fid) { return slotToField.indexOf(fid); }

function assignSlot(fid) {
  if (fieldToSlot(fid) !== -1) return fieldToSlot(fid);
  const empty = slotToField.indexOf(null);
  if (empty === -1) return -1;  // both slots full
  slotToField[empty] = fid;
  document.getElementById('slot-' + empty).classList.add('active');
  applyAreaClass();
  updateTopbar();
  return empty;
}

function applyAreaClass() {
  const count = slotToField.filter(Boolean).length;
  area.classList.remove('solo','dual');
  if (count === 1) area.classList.add('solo');
  else if (count === 2) area.classList.add('dual');
}

function updateTopbar() {
  const active = slotToField.filter(Boolean);
  const el = document.getElementById('topbar-sub');
  if (active.length === 0) { el.textContent = 'LIVE SCOREBOARD'; return; }
  if (active.length === 1) {
    // If locked to a specific field (e.g. ?field=A), show "FIELD A"
    // In auto mode (no lock) show "MAIN FIELD"
    el.textContent = lockedFields ? 'FIELD ' + active[0] : 'MAIN FIELD';
  } else {
    el.textContent = 'FIELD ' + active[0] + ' · FIELD ' + active[1];
  }
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function timerFmt(s) {
  if (s == null) return '';
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function renderSlot(idx) {
  const fid  = slotToField[idx];
  const data = fieldData[fid] || {};
  const sid  = 'slot-' + idx;

  // Determine if solo
  const activeCnt = slotToField.filter(Boolean).length;
  const isSolo    = activeCnt === 1;

  // Field label
  const labelEl = document.getElementById(sid + '-label');
  if (labelEl) {
    // Solo + locked = show "FIELD X"; solo + auto = "MAIN FIELD"; dual = "FIELD X"
    if (isSolo && !lockedFields) labelEl.textContent = 'MAIN FIELD';
    else labelEl.textContent = 'FIELD ' + fid;
  }
  const htSubEl = document.getElementById(sid + '-ht-sub');
  if (htSubEl) {
    htSubEl.textContent = (isSolo && !lockedFields) ? 'MAIN FIELD' : 'FIELD ' + fid;
  }

  // Age
  const ageEl = document.getElementById(sid + '-age');
  if (ageEl) ageEl.textContent = data.ageGroup || '';

  // Teams
  const homeEl = document.getElementById(sid + '-home');
  const awayEl = document.getElementById(sid + '-away');
  if (homeEl) homeEl.textContent = (data.homeTeam || 'HOME').toUpperCase();
  if (awayEl) awayEl.textContent = (data.opposingTeam || 'AWAY').toUpperCase();

  // Scores
  const f = data.totalFor ?? 0, a = data.totalAgainst ?? 0;
  const sfEl = document.getElementById(sid + '-sf');
  const saEl = document.getElementById(sid + '-sa');
  if (sfEl) { sfEl.textContent = f; sfEl.className = 'score-num ' + (f > a ? 'leader' : 'tied'); }
  if (saEl) { saEl.textContent = a; saEl.className = 'score-num ' + (a > f ? 'leader' : 'tied'); }

  // Stats
  const statsEl = document.getElementById(sid + '-stats');
  if (statsEl) statsEl.innerHTML = `
    <div class="stat-pill">T <span class="sv">${data.triesFor??0}–${data.triesAgainst??0}</span></div>
    <div class="stat-pill">C <span class="sv">${data.conversionsFor??0}–${data.conversionsAgainst??0}</span></div>
    <div class="stat-pill">P <span class="sv">${data.penaltiesFor??0}–${data.penaltiesAgainst??0}</span></div>
    <div class="stat-pill">DK <span class="sv">${data.dropKicksFor??0}–${data.dropKicksAgainst??0}</span></div>
  `;

  // Timer
  const timerEl = document.getElementById(sid + '-timer');
  if (timerEl) timerEl.textContent = timerFmt(data.timerSeconds);

  // Blank / half time
  const htEl = document.getElementById(sid + '-ht');
  if (htEl) htEl.classList.toggle('active', !!data.blanked);
}

function renderAll() {
  slotToField.forEach((fid, i) => { if (fid) renderSlot(i); });
}

// ═══════════════════════════════════════════════════════════════
//  HANDLE INCOMING STATE
// ═══════════════════════════════════════════════════════════════
function handleState(data) {
  const fid = String(data.fieldId || '').toUpperCase();
  if (!ALL_FIELDS.includes(fid)) return;
  if (lockedFields && !lockedFields.includes(fid)) return;

  const prevCount = slotToField.filter(Boolean).length;
  fieldData[fid] = data;

  if (!lockedFields) assignSlot(fid);

  const nowCount = slotToField.filter(Boolean).length;
  // If slot count changed, re-render all to update MAIN FIELD labels
  if (nowCount !== prevCount) { renderAll(); }
  else {
    const idx = fieldToSlot(fid);
    if (idx !== -1) renderSlot(idx);
  }

  document.getElementById('waiting').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  ABLY
// ═══════════════════════════════════════════════════════════════
// ── Fullscreen ────────────────────────────────────────────────
function toggleFullscreen() {
  const btn = document.getElementById('fs-btn');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    if (btn) btn.textContent = '✕';
  } else {
    document.exitFullscreen().catch(() => {});
    if (btn) btn.textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fs-btn');
  if (btn) btn.textContent = document.fullscreenElement ? '✕' : '⛶';
});

const ably = new Ably.Realtime({ key: ABLY_API_KEY, clientId: 'scoreboard-display' });
const ch   = ably.channels.get(ABLY_CHANNEL);

ably.connection.on('connected', async () => {
  try {
    const page = await ch.history({ limit: 40 });
    page.items.slice().reverse().forEach(msg => {
      if (msg.name === 'state' && msg.data) handleState(msg.data);
    });
  } catch(e) { console.warn('History fetch failed', e); }
});

ch.subscribe('state', msg => {
  if (msg.data) handleState(msg.data);
});
</script>
</body>
</html>
